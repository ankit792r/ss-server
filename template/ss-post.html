{{#> layout }}
<div class="content-wrapper">
  <form class="pure-form pure-form-stacked" method="post" action="/share/post">
    <label for="clip">Paste your text here</label>
    <textarea
      id="clip"
      name="raw_content"
      class="pure-input-1"
      rows="10"
      placeholder="Type or paste..."
    ></textarea>
    <button type="submit" class="pure-button pure-button-primary">
      Send
    </button>
  </form>
</div>
{{/ layout}}
