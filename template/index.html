<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipShare - Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css">
    <style>
        .content-wrapper { padding: 2em; max-width: 800px; margin: auto; }
        .hero { background: #f8f9fa; padding: 3em; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

    {{> partials/navbar}}

    <div class="content-wrapper">
        <div class="hero">
            <h1>Share your Clipboard</h1>
            <p>Instantly share text, code snippets, or URLs across devices.</p>
            <a href="/share" class="pure-button pure-button-primary">Get Started</a>
        </div>
    </div>

    {{> partials/footer}}

</body>
</html>
