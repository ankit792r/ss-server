<!doctype html>
<html lang="en">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeyDrop - Share Once, Secure Forever</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <style>
      .hero {
        display: grid;
        grid-template-columns: 1fr;
        gap: 2rem;
        align-items: center;
      }

      @media (min-width: 768px) {
        .hero {
          grid-template-columns: 1fr 1fr;
        }
      }

      .hero img {
        width: 100%;
        border-radius: 12px;
      }

      .stats {
        margin-top: 3rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1.5rem;
        text-align: center;
      }

      .stat-box {
        padding: 1.5rem;
        border: 1px solid #ddd;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    {{> partials/navbar}}

    <div class="content-wrapper">{{> @partial-block }}</div>

    {{> partials/footer}}
  </body>
</html>
